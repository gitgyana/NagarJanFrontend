<div class="container">
    <div class="executive-summary">
        @for (data of labelData; track $index) {
            <app-label-card
                [label]="data.label"
                [value]="data.value"
                [type]="data.type"
            />
        }
    </div>

    <div class="category-inbound">
        @for (data of progressData; track $index) {
            <app-progress-card
                [label]="data.label"
                [labelValue]="data.labelValue"
            />
        }
    </div>

    <app-table />
</div>

<div class="page">
    <div class="header">
        <h2>Submit Grievance</h2>
        <p>Report issues via text, email, or voice</p>
    </div>

    <div class="source-toggle">
        @for (src of ['TEXT', 'EMAIL', 'PHONE']; track src) {
            <button
                [class.active]="selectedSource === src"
                (click)="selectSource(src)">
                {{ src }}
            </button>
        }
    </div>

    <div class="card">

        @if (selectedSource === 'TEXT') {
            <input placeholder="Title" [(ngModel)]="formData.title"/>
            <textarea placeholder="Describe the issue..." [(ngModel)]="formData.content"></textarea>
        }

        @if (selectedSource === 'EMAIL') {
            <input type="email" placeholder="Sender Email" [(ngModel)]="formData.email"/>
            <input placeholder="Subject" [(ngModel)]="formData.title"/>
            <textarea placeholder="Email content..." [(ngModel)]="formData.content"></textarea>
        }

        @if (selectedSource === 'PHONE') {

            <div class="voice-card">

                <button class="mic-btn" (click)="startRecording()">
                    {{ isRecording ? 'Listening...' : 'Start Recording' }}
                </button>

                @if (transcript) {
                    <div class="transcript">
                        <p>{{ transcript }}</p>

                        <span class="badge">
                            {{ detectType(transcript) }}
                        </span>
                    </div>
                }

            </div>

        }

        <button class="submit-btn" (click)="submit()">
            Submit Grievance
        </button>

    </div>
</div>
